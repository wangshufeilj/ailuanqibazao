<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 768 660" style="max-width: 768px;">
  <defs>
    
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#373c34"/>
      <stop offset="38%" stop-color="#30352d"/>
      <stop offset="100%" stop-color="#262b24"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="42%" r="52%">
      <stop offset="0%" stop-color="#555d4f" stop-opacity="0.95"/>
      <stop offset="48%" stop-color="#41473c" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#2a2f27" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="panelAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b7dd2c" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#8caf1b" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#8caf1b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="vignette" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.14"/>
    </linearGradient>
    
    <linearGradient id="panelFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7e9b18"/>
      <stop offset="45%" stop-color="#769114"/>
      <stop offset="100%" stop-color="#61780f"/>
    </linearGradient>
    <linearGradient id="panelOverlay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d7ff54" stop-opacity="0.14"/>
      <stop offset="45%" stop-color="#d7ff54" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="edgeLight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0ff73" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#e0ff73" stop-opacity="0.12"/>
    </linearGradient>
    
    <filter id="moduleGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#b9e22f" flood-opacity="0.16"/>
      <feDropShadow dx="0" dy="0" stdDeviation="16" flood-color="#92b818" flood-opacity="0.08"/>
    </filter>
    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="tinyGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feDropShadow dx="0" dy="0" stdDeviation="2.2" flood-color="#d7ff68" flood-opacity="0.30"/>
    </filter>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" seed="7" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0 0.03 0.05"/>
      </feComponentTransfer>
    </filter>
    
    <symbol id="darkCell" viewBox="0 0 64 64">
      <rect x="6" y="6" width="52" height="52" rx="4" fill="#1d221d" fill-opacity="0.34" stroke="#5d6657" stroke-opacity="0.16"/>
